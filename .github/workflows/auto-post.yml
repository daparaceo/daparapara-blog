# .github/workflows/auto-post.yml
# 생활정보 자동 포스트 생성 — 매일 09:00 KST / 21:00 KST
# (KST = UTC+9 → UTC 00:00 / 12:00)

name: Auto Post (생활정보)

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST
    - cron: '0 12 * * *'  # 매일 21:00 KST
  # GitHub Actions 탭에서 수동 실행 허용
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate Post
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Checkout private guide
        uses: actions/checkout@v4
        with:
          repository: daparaceo/daparapara-blog.private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: .private

      - name: Install dependencies
        run: |
          npm ci
          npm install @anthropic-ai/sdk --no-save

      - name: Generate post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESULT=$(node .private/scripts/generate-post.mjs)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Script result: $RESULT"

      - name: Commit and push
        if: startsWith(steps.generate.outputs.result, 'GENERATED:')
        run: |
          FILEPATH="${{ steps.generate.outputs.result }}"
          FILEPATH="${FILEPATH#GENERATED:}"

          git config user.name "daparapara-bot"
          git config user.email "daparaceo@gmail.com"

          git add "$FILEPATH"

          FILENAME=$(basename "$FILEPATH" .md)
          git commit -m "feat: 자동 생활정보 포스트 — ${FILENAME}" -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"

          git push

      - name: Trigger deploy
        if: startsWith(steps.generate.outputs.result, 'GENERATED:')
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No topic available
        if: steps.generate.outputs.result == 'NO_TOPIC'
        run: echo "대기 중인 토픽이 없습니다. scripts/auto-post-topics.json에 토픽을 추가하세요."
