# .github/workflows/deploy.yml
# GitHub Actions 자동 배포 워크플로우
# main 브랜치에 push 시 자동으로 Astro 빌드 후 GitHub Pages 배포

name: Deploy to GitHub Pages

on:
  # main 브랜치 push 시 자동 실행
  push:
    branches: [main]
  # GitHub Actions 탭에서 수동 실행 허용
  workflow_dispatch:

# GitHub Pages 배포 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (새 배포가 시작되면 이전 배포 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
        env:
          # GitHub Pages 기본 URL 자동 주입 (커스텀 도메인 없을 때 사용)
          # SITE: ${{ steps.pages.outputs.origin }}
          # BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro 빌드 출력 디렉토리 (기본값: dist)
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
